                    currency: 'USD',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 0,

                    ...prev,
                    [field]: Math.max(0, prev[field] + increment)

                    contact_name: contactInfo.name,
                    contact_email: contactInfo.email,

                    speaking_opportunities: notorietyOptions.speakingOpportunities,
                    notoriety_total: notorietyTotal,
                    grand_total: grandTotal,
                    submitted_at: new Date().toISOString()

                      .from('budget_submissions')
                      .insert([budgetData]);
                    
                    if (error) throw error;

                    setShowSuccessModal(true);

                                                    <span>Event Tickets ({totalEventTickets})</span>
                                                    <span className="font-semibold">{formatCurrency(ventureBuilderTotal)}</span>
                                                </div>
                                            )}
                                            
                                            {notorietyTotal > 0 && (
                                                <div>
                                                    <div className="flex justify-between text-slate-200 mb-2">
                                                        <span>Notoriety</span>
                                                        <span className="font-semibold">{formatCurrency(notorietyTotal)}</span>
                                                    </div>
                                                    <div className="text-sm text-slate-400 pl-4">
                                                        {notorietyOptions.leadershipInterviews > 0 && (
                                                            <div>• {notorietyOptions.leadershipInterviews} interview{notorietyOptions.leadershipInterviews > 1 ? 's' : ''}</div>
                                                        )}
                                                        {notorietyOptions.speakingOpportunities > 0 && (
                                                            <div>• {notorietyOptions.speakingOpportunities} placement{notorietyOptions.speakingOpportunities > 1 ? 's' : ''}</div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div className="border-t border-blue-400 pt-4">
                                            <div className="flex justify-between items-center">
                                                <span className="text-xl text-white font-semibold">Total Investment</span>
                                                <span className="text-4xl font-bold text-blue-300">{formatCurrency(grandTotal)}</span>
                                            </div>
                                        </div>
                                    </div>

                                    {/* What's Included */}
                                    <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                                        <h3 className="text-lg font-bold text-white mb-4">Your Partnership Includes</h3>
                                        <div className="space-y-3 text-sm">
                                            {peerGroupParticipants > 0 && (
                                                <div className="flex items-start gap-2">
                                                    <CheckCircle2 className="w-5 h-5 text-blue-400 mt-0.5 flex-shrink-0" />
                                                    <span className="text-slate-300">
                                                        Peer group access for {peerGroupParticipants} team member{peerGroupParticipants > 1 ? 's' : ''}
                                                    </span>
                                                </div>
                                            )}
                                            
                                            {totalEventTickets > 0 && (
                                                <div className="flex items-start gap-2">
                                                    <CheckCircle2 className="w-5 h-5 text-cyan-400 mt-0.5 flex-shrink-0" />
                                                    <span className="text-slate-300">
                                                        {totalEventTickets} ticket{totalEventTickets > 1 ? 's' : ''} to global events (including VB Retreat Milan)
                                                    </span>
                                                </div>
                                            )}
                                            
                                            {notorietyOptions.leadershipInterviews > 0 && (
                                                <div className="flex items-start gap-2">
                                                    <CheckCircle2 className="w-5 h-5 text-yellow-400 mt-0.5 flex-shrink-0" />
                                                    <span className="text-slate-300">
                                                        {notorietyOptions.leadershipInterviews} professional interview{notorietyOptions.leadershipInterviews > 1 ? 's' : ''} with distribution
                                                    </span>
                                                </div>
                                            )}
                                            
                                            {notorietyOptions.speakingOpportunities > 0 && (
                                                <div className="flex items-start gap-2">
                                                    <CheckCircle2 className="w-5 h-5 text-yellow-400 mt-0.5 flex-shrink-0" />
                                                    <span className="text-slate-300">
                                                        {notorietyOptions.speakingOpportunities} speaking/publication placement{notorietyOptions.speakingOpportunities > 1 ? 's' : ''}
                                                    </span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Contact Form */}
                                    <div className="bg-slate-800 rounded-xl p-6 border border-slate-700">
                                        <h3 className="text-lg font-bold text-white mb-4">Your Contact Information</h3>
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">
                                                    Name <span className="text-red-400">*</span>
                                                </label>
                                                <input
                                                    type="text"
                                                    value={contactInfo.name}
                                                    onChange={(e) => setContactInfo(prev => ({ ...prev, name: e.target.value }))}
                                                    placeholder="Your full name"
                                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-colors"
                                                    required
                                                />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">
                                                    Email <span className="text-red-400">*</span>
                                                </label>
                                                <input
                                                    type="email"
                                                    value={contactInfo.email}
                                                    onChange={(e) => setContactInfo(prev => ({ ...prev, email: e.target.value }))}
                                                    placeholder="your.email@organization.com"
                                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-colors"
                                                    required
                                                />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">
                                                    Organization <span className="text-red-400">*</span>
                                                </label>
                                                <input
                                                    type="text"
                                                    value={contactInfo.organization}
                                                    onChange={(e) => setContactInfo(prev => ({ ...prev, organization: e.target.value }))}
                                                    placeholder="Your accelerator or program name"
                                                    className="w-full px-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white placeholder-slate-400 focus:outline-none focus:border-blue-500 transition-colors"
                                                    required
                                                />
                                            </div>
                                            
                                            <div>
                                                <label className="block text-sm font-medium text-slate-300 mb-2">
                                                    When does your budget renew? <span className="text-slate-500">(optional)</span>
                                                </label>
                                                <p className="text-xs text-slate-400 mb-2">
                                                    This helps us know when to send you an invoice for the services you've selected.
                                                </p>
                                                <div className="relative">
                                                    <Calendar className="absolute left-3 top-1/2 transform -translate-y-1/2 w-5 h-5 text-slate-400 pointer-events-none" />
                                                    <input
                                                        type="date"
                                                        value={contactInfo.budgetRenewalDate}
                                                        onChange={(e) => setContactInfo(prev => ({ ...prev, budgetRenewalDate: e.target.value }))}
                                                        className="w-full pl-11 pr-4 py-2 bg-slate-700 border border-slate-600 rounded-lg text-white focus:outline-none focus:border-blue-500 transition-colors"
                                                    />
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* Book a Call Button */}
                                    <a 
                                        href="https://calendar.app.google/6YRuk1kjFCc5wspZ7"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="w-full bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-2 border border-slate-600 hover:border-slate-500"
                                    >
                                        <Calendar className="w-5 h-5" />
                                        <span>Book a Call to Discuss</span>
                                        <ExternalLink className="w-4 h-4" />
                                    </a>

                                    {/* Submit Button */}
                                    <button 
                                        onClick={handleSubmit}
                                        disabled={isSubmitting || grandTotal === 0 || !contactInfo.name || !contactInfo.email || !contactInfo.organization}
                                        className={`w-full font-bold py-4 px-6 rounded-xl transition-all duration-200 shadow-lg flex items-center justify-center gap-2 ${
                                            submitSuccess 
                                                ? 'bg-green-600 hover:bg-green-700' 
                                                : 'bg-gradient-to-r from-blue-600 to-blue-500 hover:from-blue-700 hover:to-blue-600'
                                        } text-white ${(isSubmitting || grandTotal === 0 || !contactInfo.name || !contactInfo.email || !contactInfo.organization) ? 'opacity-50 cursor-not-allowed' : 'hover:shadow-xl'}`}
                                    >
                                        {submitSuccess ? (
                                            <>
                                                <CheckCircle2 className="w-5 h-5" />
                                                <span>Budget Saved!</span>
                                            </>
                                        ) : isSubmitting ? (
                                            <span>Saving...</span>
                                        ) : (
                                            <>
                                                <span>Save Budget Preferences</span>
                                                <ArrowRight className="w-5 h-5" />
                                            </>
                                        )}
                                    </button>
                                    
                                    <div className="text-center space-y-2">
                                        <p className="text-slate-400 text-sm">
                                            {grandTotal === 0 
                                                ? 'Select at least one option to save your budget'
                                                : !contactInfo.name || !contactInfo.email || !contactInfo.organization
                                                ? 'Please complete all required fields (name, email, organization) to continue'
                                                : 'This is non-binding — just helps us understand your needs and timing'}
                                        </p>
                                        <p className="text-slate-500 text-xs">
                                            💡 This tool is for planning only. No commitment required.
                                        </p>
                                    </div>
                                </div>
                            </div>
                        </div>

                        {/* Footer */}
                        <div className="mt-12 text-center">
                            <p className="text-slate-400 text-sm">
                                Built for Venture Builders • Partnership Budget Planning Tool
                            </p>
                        </div>
                    </div>

                    {/* Success Modal */}
                    {showSuccessModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-slate-800 rounded-2xl max-w-2xl w-full p-8 border-2 border-green-500 relative">
                                {/* Close button */}
                                <button
                                    onClick={() => setShowSuccessModal(false)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"
                                >
                                    <X className="w-6 h-6" />
                                </button>

                                {/* Success content */}
                                <div className="text-center mb-6">
                                    <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                        <CheckCircle2 className="w-10 h-10 text-white" />
                                    </div>
                                    <h2 className="text-3xl font-bold text-white mb-2">Budget Preferences Saved!</h2>
                                    <p className="text-slate-300 text-lg">
                                        Thank you, {contactInfo.name}. We've received your budget preferences.
                                    </p>
                                </div>

                                {/* What happens next */}
                                <div className="bg-slate-700/50 rounded-xl p-6 mb-6">
                                    <h3 className="text-xl font-bold text-white mb-3">What Happens Next</h3>
                                    <ul className="space-y-3 text-slate-300">
                                        <li className="flex items-start gap-3">
                                            <CheckCircle2 className="w-5 h-5 text-green-400 mt-0.5 flex-shrink-0" />
                                            <span>We'll review your preferences and prepare a customized proposal</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <CheckCircle2 className="w-5 h-5 text-green-400 mt-0.5 flex-shrink-0" />
                                            <span>{contactInfo.budgetRenewalDate ? (
                                                <>You'll receive an invoice around your budget renewal date: <strong>{new Date(contactInfo.budgetRenewalDate).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}</strong></>
                                            ) : (
                                                <>We'll reach out to discuss timing and next steps</>
                                            )}</span>
                                        </li>
                                        <li className="flex items-start gap-3">
                                            <CheckCircle2 className="w-5 h-5 text-green-400 mt-0.5 flex-shrink-0" />
                                            <span>This is completely non-binding — you can adjust or cancel anytime</span>
                                        </li>
                                    </ul>
                                </div>

                                {/* Free Bulk Upload CTA */}
                                <div className="bg-gradient-to-br from-blue-900/40 to-purple-900/40 border-2 border-blue-500/50 rounded-xl p-6 mb-6">
                                    <div className="flex items-start gap-4">
                                        <div className="w-12 h-12 bg-blue-500 rounded-lg flex items-center justify-center flex-shrink-0">
                                            <TrendingUp className="w-6 h-6 text-white" />
                                        </div>
                                        <div>
                                            <h3 className="text-xl font-bold text-white mb-2">🎁 Free Bonus: Upload Your Founders</h3>
                                            <p className="text-slate-300 mb-4">
                                                While you're here, upload your portfolio founders to our deal flow pipeline — completely free. Help your startups get discovered by investors and partners in our network.
                                            </p>
                                            <a
                                                href="https://venturebuilders.fund/bulk-upload.html"
                                                target="_blank"
                                                rel="noopener noreferrer"
                                                className="inline-flex items-center gap-2 bg-blue-500 hover:bg-blue-600 text-white font-semibold px-6 py-3 rounded-lg transition-colors"
                                            >
                                                <span>Upload Founders Now (Free)</span>
                                                <ExternalLink className="w-4 h-4" />
                                            </a>
                                        </div>
                                    </div>
                                </div>

                                {/* Action buttons */}
                                <div className="flex gap-4">
                                    <a
                                        href="https://calendar.app.google/6YRuk1kjFCc5wspZ7"
                                        target="_blank"
                                        rel="noopener noreferrer"
                                        className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl transition-all duration-200 flex items-center justify-center gap-2"
                                    >
                                        <Calendar className="w-5 h-5" />
                                        <span>Book a Call</span>
                                    </a>
                                    <button
                                        onClick={() => setShowSuccessModal(false)}
                                        className="flex-1 bg-slate-700 hover:bg-slate-600 text-white font-semibold py-3 px-6 rounded-xl transition-all duration-200"
                                    >
                                        Close
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<BudgetCalculator />);
    </script>
</body>
</html>
